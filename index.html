<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amirali Kazemi - Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Base styles matching the design */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f6f7f9; /* Light grey/white matching the dribbble shot */
        }
        
        .fade-block {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        
        .fade-out {
            opacity: 0;
            transform: translateY(10px) scale(0.98);
            pointer-events: none;
        }

        /* Toggle Button Styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #1a202c;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #1a202c;
        }
        
        /* Arc Timeline */
        .arc-path {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-top: 1.5px solid #d1d5db;
            border-left: 1.5px solid #d1d5db;
            border-top-left-radius: 100%;
            z-index: 0;
        }

        .chart-bar {
            transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-screen lg:h-screen w-screen overflow-x-hidden lg:overflow-hidden flex flex-col text-gray-900 selection:bg-purple-200">

    <!-- Header Navigation -->
    <header class="relative z-50 flex flex-wrap justify-between items-center w-full px-4 lg:px-6 py-4 bg-transparent shrink-0 gap-y-4">
        <!-- Logo -->
        <div class="flex items-center gap-2 font-bold text-lg lg:text-xl tracking-tight order-1">
            <div class="w-7 h-7 lg:w-8 lg:h-8 bg-black text-white rounded-full flex items-center justify-center shrink-0">
                <i data-lucide="zap" class="w-3 h-3 lg:w-4 lg:h-4"></i>
            </div>
            Amirali<span class="text-gray-500 font-medium hidden sm:inline">Kazemi</span>
        </div>

        <!-- Center Menu / Persona Toggle -->
        <div class="flex items-center justify-center order-3 w-full lg:w-auto lg:order-2 mt-2 lg:mt-0">
            <div class="relative flex items-center bg-gray-200/80 rounded-full p-1 w-full max-w-[300px] lg:w-64 cursor-pointer shadow-inner shadow-gray-300/50" id="toggle-container">
                <div id="toggle-slider" class="absolute top-1 bottom-1 w-[calc(50%-4px)] bg-black rounded-full transition-transform duration-300 ease-out shadow-sm translate-x-0"></div>
                <div id="text-eng" class="flex-1 text-center py-2 lg:py-1.5 text-sm font-semibold z-10 transition-colors duration-300 text-white select-none">Engineer</div>
                <div id="text-dev" class="flex-1 text-center py-2 lg:py-1.5 text-sm font-semibold z-10 transition-colors duration-300 text-gray-500 select-none">Web Dev</div>
            </div>
        </div>

        <!-- Right Side Nav -->
        <div class="flex items-center gap-3 lg:gap-5 order-2 lg:order-3">
            <a href="mailto:4amiralikazemi@gmail.com" class="text-gray-500 hover:text-black transition-colors hidden sm:block"><i data-lucide="mail" class="w-5 h-5"></i></a>
            <a href="https://linkedin.com/in/amiralikazemi" target="_blank" class="text-gray-500 hover:text-black transition-colors"><i data-lucide="linkedin" class="w-5 h-5"></i></a>
            <a href="https://github.com/amiralikazemi" target="_blank" class="text-gray-500 hover:text-black transition-colors"><i data-lucide="github" class="w-5 h-5"></i></a>
            <button class="bg-black text-white px-4 py-2 lg:px-5 lg:py-2.5 rounded-full text-xs font-semibold flex items-center gap-2 hover:bg-gray-800 transition-colors shadow-lg shadow-gray-200 ml-1">
                <span class="hidden sm:inline">Let's Talk</span>
                <i data-lucide="message-circle" class="w-4 h-4 sm:hidden"></i>
            </button>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="flex-1 w-full max-w-[1600px] mx-auto flex flex-col lg:grid lg:grid-cols-12 gap-6 px-4 lg:px-6 pb-6 overflow-y-auto lg:overflow-hidden">
        
        <!-- Left Column -->
        <div class="lg:col-span-3 flex flex-col justify-between pt-2 lg:pt-4 pb-2 relative fade-block shrink-0" id="col-left">
            
            <div class="flex gap-4">
                <!-- Vertical Progress -->
                <div class="flex flex-col items-center mt-2 shrink-0">
                    <div class="w-5 h-5 rounded-full bg-black text-white flex items-center justify-center text-[10px] font-bold">1</div>
                    <div class="w-px h-8 bg-gray-300 my-1"></div>
                    <div class="w-4 h-4 rounded-full border border-gray-400 flex items-center justify-center text-[9px] text-gray-400 font-medium">2</div>
                    <div class="w-px h-8 bg-gray-300 my-1"></div>
                    <div class="w-4 h-4 rounded-full border border-gray-400 flex items-center justify-center text-[9px] text-gray-400 font-medium">3</div>
                </div>

                <!-- Text Content -->
                <div>
                    <h1 id="hero-title" class="text-3xl lg:text-4xl leading-[1.1] font-semibold tracking-tight text-gray-900 mb-6 font-serif-like"></h1>
                    <h2 class="text-base lg:text-lg font-medium text-gray-800 mb-2" id="hero-heading"></h2>
                    <p id="hero-subtitle" class="text-gray-500 text-sm leading-relaxed mb-8 pr-4"></p>
                    
                    <button class="bg-black text-white px-5 py-2.5 rounded-full text-sm font-medium flex items-center gap-3 hover:bg-gray-800 transition-colors w-max shadow-md shadow-gray-300">
                        View Resume

                    </button>
                </div>
            </div>

            <!-- Arc Timeline Decoration -->
            <div class="relative w-full h-[30%] min-h-[160px] max-h-[220px] mt-8 lg:mt-12 pl-12 pr-4 z-10 hidden xl:block">
                <div class="arc-path"></div>
                <!-- Arc Nodes -->
                <div class="absolute top-[3%] left-[10%] flex flex-col items-center -translate-x-1/2 -translate-y-1/2">
                    <div class="w-2.5 h-2.5 bg-black rounded-full ring-4 ring-white shadow z-10"></div>
                    <span class="text-[10px] text-gray-500 font-medium mt-1 truncate max-w-[80px]" id="node-1"></span>
                </div>
                <div class="absolute top-[35%] left-[0%] flex flex-col items-end translate-x-3 -translate-y-1/2">
                    <span class="text-[10px] text-gray-500 font-medium whitespace-nowrap mr-2" id="node-2"></span>
                    <div class="w-2.5 h-2.5 bg-black rounded-full ring-4 ring-white shadow z-10 absolute -right-1 top-1"></div>
                </div>
                <div class="absolute top-[80%] left-[5%] flex flex-col items-start translate-x-1 translate-y-2">
                    <div class="w-2.5 h-2.5 bg-black rounded-full ring-4 ring-white shadow z-10 -ml-1.5 -mt-3"></div>
                    <span class="text-[10px] text-gray-500 font-medium whitespace-nowrap" id="node-3"></span>
                </div>
                
                <!-- Floating Mini Box matching Dribbble -->
                <div class="absolute bottom-[0%] left-[25%]">
                    <div class="w-16 h-16 rounded-2xl bg-white shadow-xl rotate-12 p-1 overflow-hidden pointer-events-none fade-block" id="arc-image-container">
                        <img src="https://images.unsplash.com/photo-1573164713988-8665fc963095?auto=format&fit=crop&q=80&w=200" id="arc-image" class="w-full h-full object-cover rounded-xl" />
                    </div>
                </div>
            </div>
            
        </div>

        <!-- Center Column -->
        <div class="lg:col-span-6 h-[500px] lg:h-full flex flex-col fade-block shrink-0" id="col-center">
            <div class="w-full h-full rounded-[24px] lg:rounded-[32px] overflow-hidden relative shadow-md flex flex-col justify-end p-4 lg:p-6 transition-all duration-500" id="center-bg">
                
                <!-- Background visual -->
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1200" id="center-image" class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-multiply transition-opacity duration-500" />
                
                <!-- Gradient Fill Overlay -->
                <div class="absolute inset-0 bg-gradient-to-t from-transparent via-white/10 to-transparent mix-blend-overlay"></div>

                <!-- Top Icons -->
                <div class="absolute top-4 lg:top-6 left-4 lg:left-6 w-10 h-10 lg:w-11 lg:h-11 bg-white/30 backdrop-blur-md rounded-full flex items-center justify-center text-gray-800 cursor-pointer shadow-sm hover:bg-white/50 transition z-20">
                    <i data-lucide="bookmark" class="w-4 h-4 lg:w-5 lg:h-5"></i>
                </div>
                <div class="absolute top-4 lg:top-6 right-4 lg:right-6 w-10 h-10 lg:w-11 lg:h-11 bg-white/30 backdrop-blur-md rounded-full flex items-center justify-center text-gray-800 cursor-pointer shadow-sm hover:bg-white/50 transition z-20">
                    <i data-lucide="external-link" class="w-4 h-4 lg:w-5 lg:h-5"></i>
                </div>

                <!-- Floating Main Card -->
                <div class="relative z-10 w-[95%] lg:w-full max-w-sm mx-auto mb-2 lg:mb-4 bg-white/95 backdrop-blur-xl rounded-[20px] lg:rounded-[24px] p-5 lg:p-6 shadow-2xl transition-all duration-500 translate-y-0" id="center-card">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[11px] font-bold text-gray-500 uppercase tracking-wider block mb-1" id="card-tag"></span>
                            <h3 class="text-xl lg:text-2xl font-bold text-gray-900" id="card-value"></h3>
                        </div>
                        <img src="" id="card-avatar" alt="Avatar" class="w-10 h-10 rounded-full bg-gray-100 p-0.5 shadow-sm" />
                    </div>
                    <div class="flex items-center gap-2 mb-4">
                        <span class="text-xs lg:text-sm text-gray-600 font-medium" id="card-highlight"></span>
                    </div>

                    <!-- Growth / Detail area (similar to image) -->
                    <div class="w-full rounded-2xl overflow-hidden h-28 lg:h-32 relative group">
                        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=600" id="card-cover" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                        <div class="absolute top-3 left-3 px-2.5 py-1 bg-white/80 backdrop-blur-sm rounded-full text-[10px] lg:text-xs font-bold text-gray-800 shadow-sm" id="card-growth"></div>
                    </div>
                    
                    <!-- Vertical Stepper (Left absolute positioned) -->
                    <div class="absolute -left-2 lg:-left-6 top-1/2 -translate-y-1/2 flex flex-col gap-2 bg-white/90 lg:bg-white/80 backdrop-blur-sm rounded-full p-1.5 shadow-lg z-20">
                        <div class="w-6 h-6 rounded-full bg-white shadow-sm flex items-center justify-center border border-gray-100">
                            <i data-lucide="check" class="w-3 h-3 text-black"></i>
                        </div>
                        <div onclick="prevCard()" class="w-6 h-6 rounded-full flex items-center justify-center bg-gray-50 text-gray-400 cursor-pointer hover:bg-gray-200 transition-colors text-black shadow-sm">
                            <i data-lucide="chevron-up" class="w-3 h-3"></i>
                        </div>
                        <div onclick="nextCard()" class="w-6 h-6 rounded-full flex items-center justify-center bg-gray-50 text-gray-400 cursor-pointer hover:bg-gray-200 transition-colors text-black shadow-sm">
                            <i data-lucide="chevron-down" class="w-3 h-3"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div class="lg:col-span-3 flex flex-col gap-6 fade-block pb-8 lg:pb-0 shrink-0" id="col-right">
            
            <!-- Top Right Card -->
            <div class="bg-white rounded-[24px] lg:rounded-[32px] p-5 lg:p-6 shadow-[0_2px_15px_-3px_rgba(0,0,0,0.07)] flex-1 flex flex-col relative overflow-hidden group border border-gray-50">
                <div class="absolute top-6 right-6 w-8 h-8 rounded-full border border-gray-100 bg-gray-50 flex items-center justify-center text-gray-500 group-hover:bg-gray-100 transition-colors cursor-pointer">
                    <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                </div>
                
                <h3 class="text-gray-500 font-medium text-[13px] mb-1" id="tr-title"></h3>
                <div class="text-[2.5rem] font-bold text-gray-900 leading-none tracking-tight mb-2" id="tr-metric"></div>
                <p class="text-[13px] text-gray-400 mb-6" id="tr-subtext"></p>

                <!-- Avatars Array matching dribbble -->
                <div class="flex items-center justify-center relative h-16 w-full mb-4" id="avatars-container">
                    <!-- Avatars populate here with JS -->
                </div>

                <!-- List/Timeline -->
                <div class="mt-auto space-y-3" id="list-container"></div>
            </div>

            <!-- Bottom Right Card -->
            <div class="bg-white rounded-[24px] lg:rounded-[32px] p-5 lg:p-6 shadow-[0_2px_15px_-3px_rgba(0,0,0,0.07)] min-h-[220px] lg:h-[40%] flex flex-col relative group border border-gray-50">
                <div class="absolute top-6 right-6 w-8 h-8 rounded-full border border-gray-100 bg-gray-50 flex items-center justify-center text-gray-500 group-hover:bg-gray-100 transition-colors cursor-pointer">
                    <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                </div>

                <h3 class="text-gray-500 font-medium text-[13px] mb-1" id="br-title"></h3>
                <div class="text-[2.2rem] font-bold text-gray-900 leading-none tracking-tight mb-1" id="br-metric"></div>
                <p class="text-[11px] text-gray-400" id="br-subtext"></p>

                <!-- Bar Chart -->
                <div class="flex items-end justify-between w-full h-full mt-6 gap-2" id="chart-container">
                    <!-- Bars populate here -->
                </div>
            </div>

        </div>

    </main>

    <!-- JS Logic -->
    <script>
        const engineerData = {
            heroTitle: "Mechanics of Biosystems & Food Industry Engineer",
            heroHeading: "Engineering & Automation",
            heroSubtitle: "Applying advanced nondestructive testing, automation, and control engineering to solve real-world industry challenges in the food and agriculture sector.",
            timelineNodes: ["Nondestructive Testing", "Control Engineering", "Biosystems"],
            theme: {
                centerBg: "bg-[#e5e9fc]", // Soft blue/purple
                barColor: "bg-gradient-to-t from-[#8ba1f7] to-[#ccd7fe]",
                centerImg: "https://picsum.photos/id/240/1200/800",
                arcImg: "https://picsum.photos/id/111/200/200",
                coverImg: "https://picsum.photos/id/160/600/400"
            },
            centerCards: [
                {
                    tag: "Academic Excellence",
                    value: "M.Sc. Food Industry Eng.",
                    highlight: "University of Padova | Italy",
                    growth: "GPA: 25.5/30",
                    avatar: "https://ui-avatars.com/api/?name=EN&background=0D8ABC&color=fff&rounded=true"
                },
                {
                    tag: "Academic Excellence",
                    value: "B.Sc. Biosystems Eng.",
                    highlight: "University of Tehran | Iran",
                    growth: "GPA: 18.71/20",
                    avatar: "https://ui-avatars.com/api/?name=UT&background=0D8ABC&color=fff&rounded=true"
                },
                {
                    tag: "Academic Experience",
                    value: "Teaching Assistant",
                    highlight: "University of Tehran | Iran",
                    growth: "Control Systems",
                    avatar: "https://ui-avatars.com/api/?name=TA&background=0D8ABC&color=fff&rounded=true"
                }
            ],
            topRight: {
                title: "Engineering Roles",
                metric: "4+ Years",
                subtext: "Academia & Committees",
                avatars: [
                    "https://ui-avatars.com/api/?name=UP&background=e5e9fc&rounded=true",
                    "https://ui-avatars.com/api/?name=UT&background=ccd7fe&rounded=true",
                    "https://ui-avatars.com/api/?name=IR&background=8ba1f7&rounded=true"
                ],
                list: [
                    { label: "M.Sc. Uni of Padova", date: "2025 - Pres" },
                    { label: "Exec. Member IRNDT", date: "2022 - 2025" }
                ]
            },
            bottomRight: {
                title: "Tool Proficiency",
                metric: "90%",
                subtext: "Engineering Software Performance",
                skills: [
                    { name: "MATLAB", val: 95 },
                    { name: "SolidWorks", val: 85 },
                    { name: "PLC", val: 80 },
                    { name: "Arduino", val: 85 },
                    { name: "AutoCAD", val: 75 }
                ]
            }
        };

        const developerData = {
            heroTitle: "Front-end Development & Machine Learning",
            heroHeading: "Web Development starts with AI",
            heroSubtitle: "Transforming ideas into scalable front-end applications and integrating cutting-edge machine learning models like OpenAI and TensorFlow for intelligent solutions.",
            timelineNodes: ["Machine Learning", "Front-end Dev", "AI Integration"],
            theme: {
                centerBg: "bg-[#f1e6fd]", // Soft purple (like MonetAI)
                barColor: "bg-gradient-to-t from-[#b57af3] to-[#ebd4ff]",
                centerImg: "https://picsum.photos/id/180/1200/800",
                arcImg: "https://picsum.photos/id/162/200/200",
                coverImg: "https://picsum.photos/id/2/600/400"
            },
            centerCards: [
                {
                    tag: "Current Role",
                    value: "Front-end Dev",
                    highlight: "PropertyGPT LTD, Dubai",
                    growth: "JavaScript, Python",
                    avatar: "https://ui-avatars.com/api/?name=DV&background=b57af3&color=fff&rounded=true"
                },
                {
                    tag: "Certification",
                    value: "Machine Learning Spec.",
                    highlight: "Stanford University",
                    growth: "Coursera",
                    avatar: "https://ui-avatars.com/api/?name=SU&background=b57af3&color=fff&rounded=true"
                },
                {
                    tag: "Research & Publication",
                    value: "AI & Spectroscopy",
                    highlight: "Microgreens Quality",
                    growth: "Deep Learning",
                    avatar: "https://ui-avatars.com/api/?name=AI&background=b57af3&color=fff&rounded=true"
                }
            ],
            topRight: {
                title: "Core Experience",
                metric: "AI & Web",
                subtext: "Developer & Researcher",
                avatars: [
                    "https://ui-avatars.com/api/?name=D1&background=f1e6fd&rounded=true",
                    "https://ui-avatars.com/api/?name=D2&background=ebd4ff&rounded=true",
                    "https://ui-avatars.com/api/?name=D3&background=b57af3&rounded=true"
                ],
                list: [
                    { label: "Front-end @ PropertyGPT", date: "Summer 2025" },
                    { label: "ML @ Stanford", date: "Summer 2023" }
                ]
            },
            bottomRight: {
                title: "Tech Stack Rate",
                metric: "85%",
                subtext: "AI & Programming Expertise",
                skills: [
                    { name: "Python", val: 90 },
                    { name: "JavaScript", val: 85 },
                    { name: "OpenAI API", val: 80 },
                    { name: "TensorFlow", val: 75 },
                    { name: "OpenCV", val: 70 }
                ]
            }
        };

        let isDev = false;
        let cardIndex = 0;

        function updateCenterCard(data) {
            const cardData = data.centerCards[cardIndex];
            const cardEl = document.getElementById('center-card');
            
            // Fading out slightly to show transition
            cardEl.style.opacity = '0.5';
            cardEl.style.transform = 'scale(0.98)';
            
            setTimeout(() => {
                document.getElementById('card-tag').innerText = cardData.tag;
                document.getElementById('card-value').innerText = cardData.value;
                document.getElementById('card-highlight').innerText = cardData.highlight;
                document.getElementById('card-growth').innerText = cardData.growth;
                document.getElementById('card-avatar').src = cardData.avatar;
                
                cardEl.style.opacity = '1';
                cardEl.style.transform = 'scale(1)';
            }, 200);
        }

        function nextCard() {
            const data = isDev ? developerData : engineerData;
            cardIndex = (cardIndex + 1) % data.centerCards.length;
            updateCenterCard(data);
        }

        function prevCard() {
            const data = isDev ? developerData : engineerData;
            cardIndex = (cardIndex - 1 + data.centerCards.length) % data.centerCards.length;
            updateCenterCard(data);
        }

        function renderData() {
            const data = isDev ? developerData : engineerData;

            // Text Updates
            document.getElementById('hero-title').innerText = data.heroTitle;
            document.getElementById('hero-heading').innerText = data.heroHeading;
            document.getElementById('hero-subtitle').innerText = data.heroSubtitle;
            document.getElementById('node-1').innerText = data.timelineNodes[0];
            document.getElementById('node-2').innerText = data.timelineNodes[1];
            document.getElementById('node-3').innerText = data.timelineNodes[2];

            // Center Column
            const centerBg = document.getElementById('center-bg');
            centerBg.className = `w-full h-full rounded-[32px] overflow-hidden relative shadow-md flex flex-col justify-end p-6 transition-colors duration-700 ${data.theme.centerBg}`;
            document.getElementById('center-image').src = data.theme.centerImg;
            document.getElementById('arc-image').src = data.theme.arcImg;

            document.getElementById('card-tag').innerText = data.centerCards[cardIndex].tag;
            document.getElementById('card-value').innerText = data.centerCards[cardIndex].value;
            document.getElementById('card-highlight').innerText = data.centerCards[cardIndex].highlight;
            document.getElementById('card-growth').innerText = data.centerCards[cardIndex].growth;
            document.getElementById('card-avatar').src = data.centerCards[cardIndex].avatar;
            document.getElementById('card-cover').src = data.theme.coverImg;

            // Top Right
            document.getElementById('tr-title').innerText = data.topRight.title;
            document.getElementById('tr-metric').innerText = data.topRight.metric;
            document.getElementById('tr-subtext').innerText = data.topRight.subtext;

            // Circular Avatars Layout (like the MonetAI design)
            const positions = [
                'top-0 left-[20%]', 
                'bottom-0 left-[40%]', 
                'top-2 right-[20%]'
            ];
            const avatarsHtml = data.topRight.avatars.map((src, i) => `
                <img src="${src}" alt="avatar" class="absolute ${positions[i] || 'top-0 right-0'} w-11 h-11 rounded-full border-2 border-white bg-white shadow-md hover:scale-110 transition-transform" />
            `).join('');
            document.getElementById('avatars-container').innerHTML = avatarsHtml;

            const listHtml = data.topRight.list.map(item => `
                <div class="flex justify-between items-center text-[13px] border-gray-100 pb-2">
                    <span class="font-semibold text-gray-800">${item.label}</span>
                    <span class="text-gray-400 font-medium">${item.date}</span>
                </div>
            `).join('');
            document.getElementById('list-container').innerHTML = listHtml;

            // Bottom Right
            document.getElementById('br-title').innerText = data.bottomRight.title;
            document.getElementById('br-metric').innerText = data.bottomRight.metric;
            document.getElementById('br-subtext').innerText = data.bottomRight.subtext;

            const chartHtml = data.bottomRight.skills.map(skill => `
                <div class="w-full flex flex-col justify-end items-center group/bar h-full">
                    <!-- Tooltip -->
                    <span class="opacity-0 group-hover/bar:opacity-100 text-[10px] text-gray-600 mb-2 transition-opacity font-medium pointer-events-none whitespace-nowrap">${skill.name}</span>
                    <!-- Bar -->
                    <div class="chart-bar w-full rounded-t-xl ${data.theme.barColor} max-w-[40px] shadow-sm mb-0 rounded-b-sm" style="height: 0%"></div>
                </div>
            `).join('');
            document.getElementById('chart-container').innerHTML = chartHtml;

            // Refresh icons if needed
            lucide.createIcons();

            // Animate bar heights after a tiny delay
            setTimeout(() => {
                const bars = document.querySelectorAll('.chart-bar');
                bars.forEach((bar, index) => {
                    bar.style.height = `${data.bottomRight.skills[index].val}%`;
                });
            }, 100);
        }

        function togglePersona() {
            isDev = !isDev;
            cardIndex = 0; // Reset card index when toggling persona
            
            // Toggle Slider UI
            const slider = document.getElementById('toggle-slider');
            const textEng = document.getElementById('text-eng');
            const textDev = document.getElementById('text-dev');

            if(isDev) {
                slider.style.transform = 'translateX(calc(100% + 4px))';
                textEng.classList.replace('text-white', 'text-gray-500');
                textDev.classList.replace('text-gray-500', 'text-white');
            } else {
                slider.style.transform = 'translateX(0)';
                textEng.classList.replace('text-gray-500', 'text-white');
                textDev.classList.replace('text-white', 'text-gray-500');
            }

            // Crossfade blocks
            const blocks = ['col-left', 'col-center', 'col-right'].map(id => document.getElementById(id));
            blocks.forEach(b => b.classList.add('fade-out'));

            setTimeout(() => {
                renderData();
                blocks.forEach(b => b.classList.remove('fade-out'));
            }, 300);
        }

        // Event Listeners
        document.getElementById('toggle-container').addEventListener('click', togglePersona);

        // Initial setup
        document.addEventListener("DOMContentLoaded", () => {
            renderData();
            lucide.createIcons();
        });
    </script>
</body>
</html>
